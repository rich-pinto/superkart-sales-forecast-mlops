name: SuperKart MLOps Pipeline

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  pipeline:
    runs-on: ubuntu-latest
    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      HF_USERNAME: ${{ secrets.HF_USERNAME }}
      HF_DATASET_REPO: ${{ secrets.HF_DATASET_REPO }}
      HF_MODEL_REPO: ${{ secrets.HF_MODEL_REPO }}
      HF_SPACE_REPO: ${{ secrets.HF_SPACE_REPO }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pandas==2.2.2 numpy==2.0.2 scikit-learn==1.6.1 joblib==1.4.2 huggingface_hub==0.24.6 streamlit==1.36.0 pyyaml==6.0.2

      - name: Verify secrets exist
        run: |
          python - << 'PY'
          import os
          req = ["HF_TOKEN","HF_USERNAME","HF_DATASET_REPO","HF_MODEL_REPO","HF_SPACE_REPO"]
          missing = [k for k in req if not os.environ.get(k)]
          if missing:
            raise SystemExit(f"Missing GitHub Secrets: {missing}")
          print("✅ Secrets present")
          PY

      - name: Data Registration (HF Dataset Hub)
        run: python src/register_dataset.py

      - name: Data Preparation + Model Training + Evaluation
        run: python src/train.py

      - name: Model Registration (HF Model Hub)
        run: python src/register_model.py

      - name: Build Deployment Assets (Docker Space)
        run: python src/build_space_files.py

      - name: Deploy/Update HF Space (Streamlit via Docker)
        run: python deployment/push_space.py
